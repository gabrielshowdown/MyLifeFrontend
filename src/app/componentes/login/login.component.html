
<div class="parent">
  <div class="container">
    <div class="login-box">
      <img src="/img/my-life-dark.png" alt="" class="logo">
      <form action="#" (ngSubmit)="logar()" [formGroup]="formulario">
        <div class="input-box">
          <input
            type="text"
            formControlName="username"
            required
          >
          <label>Usuário</label>
        </div>
        <div class="input-box">
          <input
            [type]="passwordFieldType"
            formControlName="password"
            required
            [(ngModel)]="password"
          >
          <label>Senha</label>
          <div *ngIf="password.length > 0">
            <mat-icon class="visible" (click)="togglePasswordVisibility()" >{{passwordVisibility}}</mat-icon>
          </div>
        </div>
        <div *ngIf="loginError==true" class="incorret-password">
          Usuário/Senha incorreto
        </div>
        <div class="forgot-pass">
          <!-- Esse 'data-bs-toggle' é um atributo do b5 para identificar elementos que devem
           ativar modais e o 'data-bs-target' é qual componente deve ser aberto -->
          <a data-bs-toggle="modal" data-bs-target="#templateModal" >Esqueceu sua senha?</a>
        </div>
        <button
          [disabled]="!formulario.valid"
          type="submit"
          [ngClass]="enableButton()"
        >Login
        </button>
        <div class="signup-link">
          <a href="#">Cadastrar</a>
        </div>
      </form>
    </div>
