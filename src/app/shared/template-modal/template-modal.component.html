<div class="modal-header-custom" [ngClass]="data.theme">
  <h2>{{ data.title }}</h2>
</div>

<mat-dialog-content class="d-flex flex-column gap-2 custom-content" [ngClass]="data.theme">
  <p>{{ data.content }}</p>
</mat-dialog-content>

<mat-dialog-actions class="custom-dialog-actions" [ngClass]="data.theme">
  <button mat-stroked-button mat-dialog-close [color]="data.theme === 'day' ? 'primary' : 'accent'">
    Fechar
  </button>
</mat-dialog-actions>
