<h2 mat-dialog-title>{{ data.title}}</h2>
<mat-dialog-content>
    <p class="fs-6">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onDismiss()">
        {{ data.cancelText || 'Cancelar' }}
    </button>
    <button mat-raised-button [color]="data.confirmButtonColor || 'primary'" (click)="onConfirm()">
        {{ data.confirmText || 'Confirmar' }}
    </button>
</mat-dialog-actions>
