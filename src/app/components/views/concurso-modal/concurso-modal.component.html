<h2 mat-dialog-title class="text-center">Concurso {{ concursoInfo.numero }}</h2>

<mat-dialog-content>
  <div class="dezenas-grid-dialog mb-3">
    <div *ngFor="let dezenaInfo of resultadoOrdenado" 
         class="dezena"
         [class.repetido]="dezenaInfo.repetido"> {{ dezenaInfo.numero | number:'2.0-0' }}
    </div>
  </div>
  <p class="text-center">
    <strong>Paridade:</strong> {{ concursoInfo.impares }}Í / {{ concursoInfo.pares }}P
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button mat-dialog-close color="primary">Fechar</button>
</mat-dialog-actions>
