<div class="parent" [ngClass]="theme">
  <div>
    <mat-slide-toggle
      class="toogle-container"
      #darkModeSwitch
      [checked]="theme === 'night'"
      (change)="onToggleChange($event)">
      <!-- {{ theme === 'day' ? 'Day' : 'Night' }} -->
    </mat-slide-toggle>
  </div>
  <div
    [ngClass]="theme"
    class="link-voltar"
    (click)="backLogin()"
    >Entrar
  </div>

  <div class="register-container">

    <img src="/img/my-life-{{theme}}.png" alt="" class="logo">
    <form [formGroup]="formulario" (ngSubmit)="cadastrar()" class="grid-container">

      <!-- Mensagem de usuário registrado com sucesso -->
      <div *ngIf="afterRequestRegister" [ngClass]="typeMessage" class="alert alert-dismissible fade show" role="alert">
        {{msgAfterClickRegister}}
        <button type="button" class="btn-close" aria-label="Close" (click)="afterRequestRegister = false"></button>
      </div>

      <!-- Usuário -->
      <div class="input-box">
        <input type="text" formControlName="username" required [ngClass]="theme"/>
        <label [ngClass]="theme">Usuário</label>
      </div>

      <!-- Mensagem de Usuário já cadastrado no sistema -->
      <div *ngIf="userAlreadyRegistered==true" class="invalid-data" [ngClass]="theme">
        Já existe um usuário com esse nome
      </div>

      <!-- Senha -->
      <div class="input-box">
        <input [type]="passwordFieldType" formControlName="password" required [ngClass]="theme"/>
        <label [ngClass]="theme">Senha</label>
        <div *ngIf="formulario.get('password')?.value.length > 0">
          <mat-icon class="visible" [ngClass]="theme" (click)="togglePasswordVisibility()" >{{passwordVisibility}}</mat-icon>
        </div>
      </div>

      <!-- Confirmar Senha -->
      <div class="input-box">
        <input [type]="passwordFieldType2" formControlName="confirmPassword" required [ngClass]="theme"/>
        <label [ngClass]="theme">Confirmar Senha</label>
        <div *ngIf="formulario.get('confirmPassword')?.value.length > 0">
          <mat-icon class="visible" [ngClass]="theme" (click)="togglePasswordVisibility2()" >{{passwordVisibility2}}</mat-icon>
        </div>
      </div>

      <!-- Mensagem de senhas diferentes -->
      <div *ngIf="passwordsDifferents==true" class="invalid-data" [ngClass]="theme">
        Senhas não correspondem
      </div>

      <!-- Gênero -->
      <div class="input-box">
        <label [ngClass]="theme">Gênero</label>
        <select formControlName="gender" required [ngClass]="theme" class="styled-select">
          <option value="" disabled selected>Selecione</option>
          <option value="male" [ngClass]="theme">Masculino</option>
          <option value="female" [ngClass]="theme">Feminino</option>
          <option value="other" [ngClass]="theme">Outro</option>
        </select>
      </div>

      <!-- Localização -->
      <div class="input-box">
        <input placeholder="Cidade-UF" type="text" formControlName="location" required [ngClass]="theme"/>
        <label [ngClass]="theme">Localização</label>
      </div>

      <!-- Data de Nascimento -->
      <div class="input-box">
        <label [ngClass]="theme">Data de Nascimento</label>
        <input type="date" formControlName="birthdate" required [ngClass]="theme" />
      </div>

      <!-- Botão de Cadastrar -->
      <button [disabled]="!formulario.valid" type="submit" [ngClass]="[enableButton(), theme]">
        Registrar
      </button>

    </form>
  </div>
</div>
