<mat-card class="draw-card h-100">
  <mat-card-header class="justify-content-center mb-2">
    <mat-card-title class="fs-5 fw-bold">
      Concurso {{ draw.id }}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="dozens-grid">
      <div *ngFor="let n of draw.numerosConcurso" 
           class="dozen" 
           [class.repetido]="n.repetido">
        {{ formatNumber(n.numero) }}
      </div>
    </div>
  </mat-card-content>

  <mat-card-footer>
    <div class="d-flex justify-content-between px-3 py-2 text-muted small">
      <span>Paridade: {{draw.qtdImpares}}I / {{draw.qtdPares}}P</span>
      <span>Rep: {{ formatNumber(draw.qtdRepetidos) }}</span>
    </div>
  </mat-card-footer>
</mat-card>
